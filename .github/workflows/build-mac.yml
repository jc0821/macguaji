name: Build Mac App

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: 下载代码
      uses: actions/checkout@v4

    - name: 配置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安装打包工具
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pynput

    - name: 开始 Mac 打包
      run: pyinstaller --windowed --noconfirm --clean guaji.py

    - name: 压缩软件 (防止 Mac 权限丢失)
      run: |
        cd dist
        zip -r guaji-mac.zip guaji.app/

    - name: 输出最终文件提供下载
      uses: actions/upload-artifact@v4
      with:
        name: mac-app-release
        path: dist/guaji-mac.zip
